name: Branch CI

on:
  push:
    branches-ignore: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Restore
        shell: pwsh
        run: dotnet restore App.sln

      - name: Build
        shell: pwsh
        run: dotnet build App.sln -c Release --no-restore
